name: Website security verify
on:
  push:
    branches: [main, fix/google-maps-scraper-v2]
    paths: ["website/**", ".github/workflows/website-security-verify.yml"]
  pull_request:
    paths: ["website/**", ".github/workflows/website-security-verify.yml"]
  workflow_dispatch:
jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Lint, test, and production build
        run: npm run verify
