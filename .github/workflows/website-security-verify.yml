name: Website security verify
on:
  push:
    branches: [fix/website-security-audit]
    paths: ["website/**", ".github/workflows/website-security-verify.yml"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
        with: { ref: fix/website-security-audit }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Refresh lockfile
        run: npm install --package-lock-only --ignore-scripts
      - name: Commit refreshed lockfile
        working-directory: .
        run: |
          if ! git diff --quiet -- website/package-lock.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add website/package-lock.json
            git commit -m "chore(website): refresh dependency lockfile [skip ci]"
            git push
          fi
      - run: npm ci
      - run: npm run verify
